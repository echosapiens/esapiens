# ── nginx configuration for E.sapiens v2 frontend ──────────────────────────
#
# Serves the Vite-built single-page application and proxies API/chat
# requests to the backend service (Docker compose service name "backend").
# ────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # ── Static assets (fingerprinted) — cache aggressively ────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Proxy /chat to backend (sync + streaming SSE) ─────────────────────
    location /chat {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE needs buffering off
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # ── Proxy /api to backend (if any REST endpoints sit under /api) ──────
    location /api {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Proxy /health and /sessions to backend ────────────────────────────
    location ~ ^/(health|sessions|docs|openapi.json)$ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SPA fallback — serve index.html for all other routes ──────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
