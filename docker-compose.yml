version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ESAPIENS_DATA_DIR=/root/persistent
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000,https://esapiens.yourdomain.com
    volumes:
      - esapiens-data:/root/persistent
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  esapiens-data: